<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:40px;
}

/* CONTAINER */

.container{
    max-width:1100px;
    margin:auto;
    background:#1e293b;
    padding:40px;
    border-radius:12px;
}

/* TITLE */

.container h1{
    text-align:center;
    margin-bottom:30px;
    color:#38bdf8;
}

/* FORM */

.course-form{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    margin-bottom:40px;
}

.course-form input,
.course-form select{
    padding:12px;
    border:none;
    border-radius:6px;
    background:#334155;
    color:white;
    outline:none;
}

/* BUTTON */

button{
    padding:12px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

/* TABLE */

.table-box{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,
table td{
    padding:15px;
    border-bottom:1px solid #334155;
    text-align:left;
}

table th{
    color:#38bdf8;
}

/* ACTION BUTTONS */

.action-btn{
    padding:8px 12px;
    margin-right:5px;
}

/* RESPONSIVE */

@media(max-width:768px){

    .course-form{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="container">

    <h1>Course Management System</h1>

    <!-- COURSE FORM -->

    <div class="course-form">

        <input type="text" placeholder="Course Title">

        <input type="text" placeholder="Course Code">

        <select>
            <option>Course Unit</option>
            <option>1 Unit</option>
            <option>2 Units</option>
            <option>3 Units</option>
        </select>

    </div>

    <button onclick="addCourse()">Add Course</button>

    <!-- COURSE TABLE -->

    <div class="table-box">

        <table>

            <tr>
                <th>Course Title</th>
                <th>Course Code</th>
                <th>Unit</th>
                <th>Lecturer</th>
                <th>Action</th>
            </tr>

                <td>Mr John</td>
